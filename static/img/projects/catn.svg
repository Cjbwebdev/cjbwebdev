<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Car body -->
  <rect x="35" y="70" width="130" height="45" rx="12" fill="#f8fafc"/>
  <!-- Car roof -->
  <path d="M60 70 L75 40 L125 40 L140 70Z" fill="#e2e8f0"/>
  <!-- Windows -->
  <path d="M78 68 L88 46 L112 46 L122 68Z" fill="#1e293b" opacity="0.7"/>
  <!-- Wheels -->
  <circle cx="70" cy="118" r="18" fill="#1e293b"/>
  <circle cx="70" cy="118" r="10" fill="#64748b"/>
  <circle cx="130" cy="118" r="18" fill="#1e293b"/>
  <circle cx="130" cy="118" r="10" fill="#64748b"/>
  <!-- Headlight -->
  <rect x="155" y="80" width="8" height="12" rx="3" fill="#fbbf24"/>
  <!-- Road -->
  <rect x="0" y="138" width="200" height="62" rx="0" fill="#1e293b" opacity="0.3"/>
  <!-- CAT N text -->
  <rect x="50" y="150" width="100" height="28" rx="8" fill="white" opacity="0.15"/>
  <text x="100" y="170" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="800" fill="white" letter-spacing="3">CAT N</text>
  <text x="100" y="195" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600" fill="white" opacity="0.7" letter-spacing="1">VEHICLES</text>
</svg>
