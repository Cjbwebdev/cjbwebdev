<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0d0221"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Chart bars -->
  <rect x="35" y="100" width="16" height="30" rx="4" fill="url(#brand)" opacity="0.5"/>
  <rect x="57" y="80" width="16" height="50" rx="4" fill="url(#brand)" opacity="0.65"/>
  <rect x="79" y="55" width="16" height="75" rx="4" fill="url(#brand)" opacity="0.8"/>
  <rect x="101" y="40" width="16" height="90" rx="4" fill="url(#brand)" opacity="0.9"/>
  <!-- Trend arrow -->
  <polygon points="117,45 135,30 153,45 145,45 145,130 125,130 125,45" fill="url(#brand)"/>
  <!-- R monogram -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="900" fill="white" opacity="0.9" letter-spacing="4">RANKY U</text>
</svg>
