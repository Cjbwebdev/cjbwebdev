<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Document icon -->
  <rect x="55" y="35" width="90" height="115" rx="8" fill="white" opacity="0.95"/>
  <!-- Document lines -->
  <rect x="70" y="55" width="55" height="6" rx="3" fill="#94a3b8"/>
  <rect x="70" y="68" width="45" height="6" rx="3" fill="#94a3b8"/>
  <rect x="70" y="81" width="50" height="6" rx="3" fill="#94a3b8"/>
  <rect x="70" y="94" width="35" height="6" rx="3" fill="#94a3b8"/>
  <!-- Shield checkmark -->
  <path d="M100 110 L82 118 L82 132 Q82 148 100 155 Q118 148 118 132 L118 118Z" fill="url(#gold)"/>
  <polyline points="90,133 97,140 112,125" stroke="#1e3a5f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- PG monogram at top -->
  <text x="100" y="108" text-anchor="middle" font-family="Georgia,serif" font-size="40" font-weight="bold" fill="url(#gold)" opacity="0.3">PG</text>
  <!-- Text -->
  <text x="100" y="188" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="17" font-weight="800" fill="white" letter-spacing="2">POLICYGEN</text>
</svg>
