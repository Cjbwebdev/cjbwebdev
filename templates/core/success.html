<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Confirmed — streamingvault.online</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#06060b;color:#e4e4ec;font-family:'Inter',sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .success-wrap{text-align:center;max-width:480px}
    .checkmark{width:80px;height:80px;border-radius:50%;
      background:rgba(74,222,128,0.08);border:2px solid #4ade80;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 28px;font-size:36px;animation:scaleIn 0.5s ease}
    @keyframes scaleIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
    h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(28px,5vw,40px);font-weight:700;margin-bottom:12px}
    h1 span{color:#4ade80}
    p{color:#8a8a9a;font-size:16px;line-height:1.7;margin-bottom:32px}
    .btn-back{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:12px;
      background:rgba(124,77,255,0.08);border:1px solid rgba(124,77,255,0.2);
      color:#7c4dff;font-weight:600;font-size:14px;text-decoration:none;transition:background 0.2s}
    .btn-back:hover{background:rgba(124,77,255,0.15)}
    .order-id{margin-top:20px;font-size:12px;color:#555;font-family:monospace}
    .glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);
      width:600px;height:400px;background:radial-gradient(ellipse,rgba(74,222,128,0.08) 0%,transparent 70%);
      pointer-events:none}
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="success-wrap">
    <div class="checkmark">✓</div>
    <h1>Payment <span>Confirmed</span></h1>
    <p>Your streaming access is now active. An email is on its way with your download info and the MP4 file or download link.</p>
    <a href="/" class="btn-back">← Back Home</a>
    {% if session_id %}<div class="order-id">Session: {{ session_id }}</div>{% endif %}
  </div>
</body>
</html>
